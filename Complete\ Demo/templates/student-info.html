<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Info</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="page page-light">
    <section class="card-wide">
      <div class="dashboard-grid">
        <aside class="icon-rail">
          <a class="home-icon" href="/students">⌂</a>
        </aside>

        <section>
          <h1 class="page-title" id="studentTitle">Student Info</h1>
          <div class="info-lines" id="studentInfo" style="margin-top: 36px; max-width: 620px;">
            <p>Loading student information...</p>
          </div>

          <div class="actions">
            <a class="btn btn-primary" href="/students">Back to Students</a>
          </div>
        </section>
      </div>
    </section>
  </main>
  <script>
    async function loadStudentInfo() {
      const email = new URLSearchParams(window.location.search).get('nyu_email');
      if (!email) {
        document.getElementById('studentInfo').innerHTML = '<p>No student selected</p>';
        return;
      }

      try {
        // Fetch student's profile if they have any
        const response = await fetch(`/api/profile?nyu_email=${encodeURIComponent(email)}`);
        if (response.ok) {
          const data = await response.json();
          const student = data.student;
          document.getElementById('studentTitle').textContent = `${student.first_name} ${student.last_name}`;
          document.getElementById('studentInfo').innerHTML = `
            <p>Name: ${student.first_name} ${student.last_name}</p>
            <p>Email: ${student.nyu_email}</p>
            <p>Role: ${student.account_role}</p>
            <p>Courses: ${data.courses && data.courses.length > 0 ? data.courses.map(c => c.course_name).join(', ') : 'N/A'}</p>
          `;
        } else {
          document.getElementById('studentInfo').innerHTML = '<p>Student information not found</p>';
        }
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('studentInfo').innerHTML = '<p>Error loading student information</p>';
      }
    }

    loadStudentInfo();
  </script>
</body>
</html>
