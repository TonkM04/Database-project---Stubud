<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Group Info</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-light">
    <section class="card-wide purple-surface">
      <div class="dashboard-grid">
        <aside>
          <a class="admin-badge" href="admin-dashboard.html">Admin Dashboard</a>
        </aside>

        <section>
          <h1 class="page-title">Group #ID</h1>
          <form>
            <div class="form-grid" style="margin-top: 18px;">
              <div class="form-group"><label>Start Time</label><input type="text" value="2 PM" /></div>
              <div class="form-group"><label>End Time</label><input type="text" value="5 PM" /></div>
              <div class="form-group"><label>Number of Students</label><input type="number" value="9" /></div>
              <div class="form-group"><label>Course</label><input type="text" value="Calculus 1" /></div>
              <div class="form-group"><label>Location</label><input type="text" value="Room 434, 4th Floor, Dibner Library" /></div>
              <div class="form-group"><label>Group Notes</label><input type="text" value="Lorem ipsum" /></div>
            </div>

            <div class="student-list">
              <div class="student-chip"><div class="student-chip-inner"><span class="small-avatar">◻</span>John Doe</div></div>
              <div class="student-chip"><div class="student-chip-inner"><span class="small-avatar">◻</span>John Doe</div></div>
              <div class="student-chip"><div class="student-chip-inner"><span class="small-avatar">◻</span>John Doe</div></div>
              <div class="student-chip"><div class="student-chip-inner"><span class="small-avatar">◻</span>John Doe</div></div>
              <div class="student-chip"><div class="student-chip-inner"><span class="small-avatar">◻</span>John Doe</div></div>
              <div class="student-chip"><div class="student-chip-inner"><span class="small-avatar">◻</span>John Doe</div></div>
            </div>

            <div class="actions center-actions">
              <button class="btn btn-secondary">Update Info</button>
              <button class="btn btn-secondary" style="color: red;">Delete Group</button>
            </div>
          </form>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
