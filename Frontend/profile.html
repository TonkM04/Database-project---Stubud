<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-light">
    <section class="card-wide">
      <div class="dashboard-grid">
        <aside class="icon-rail">
          <a class="home-icon" href="dashboard.html">⌂</a>
        </aside>

        <section>
          <h1 class="page-title">Profile</h1>
          <form style="margin-top: 18px; max-width: 760px;">
            <div class="form-grid">
              <div class="form-group"><label>Name</label><input type="text" /></div>
              <div></div>
              <div class="form-group"><label>Course</label><select><option></option><option>Calculus 1</option><option>Physics</option><option>CS-UY 1114</option></select></div>
              <div></div>
              <div class="form-group"><label>Year</label><select><option></option><option>Freshman</option><option>Sophomore</option><option>Junior</option><option>Senior</option></select></div>
              <div></div>
              <div class="form-group"><label>Password</label><input type="password" /></div>
              <div></div>
            </div>

            <div class="form-row-3" style="margin-top: 10px;">
              <div class="form-group">
                <label>Week days availability</label>
                <select><option></option><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option></select>
              </div>
              <div class="form-group">
                <label>Start Time</label>
                <select><option></option><option>2 PM</option><option>3 PM</option><option>4 PM</option></select>
              </div>
              <div class="form-group">
                <label>End Time</label>
                <select><option></option><option>5 PM</option><option>6 PM</option><option>7 PM</option></select>
              </div>
            </div>

            <div class="actions">
              <a class="btn btn-primary" href="dashboard.html">Update Info</a>
              <a class="btn btn-danger" href="login.html">Delete Account</a>
            </div>
          </form>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
