<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StuBud Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-light">
    <section class="card compact" style="max-width: 460px; padding: 48px 42px;">
      <h1 class="brand" style="font-size: 4rem;">StuBud</h1>

      <form action="dashboard.html" style="max-width: 320px; margin: 22px auto 0;">
        <div class="form-group">
          <label for="nyu-email">NYU Email</label>
          <input id="nyu-email" type="email" placeholder="netid@nyu.edu" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password" />
        </div>

        <button class="btn btn-primary btn-block" type="submit">Login</button>
        <a class="btn btn-primary btn-block" href="signup.html" style="margin-top: 10px;">Sign Up</a>
      </form>

      <div class="link-row">
        <a href="signup.html">Don’t have an account?</a>
      </div>
    </section>
  </main>
</body>
</html>
