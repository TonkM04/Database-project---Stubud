<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Group</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-light">
    <section class="card compact center-stack" style="max-width: 620px; min-height: 520px; justify-content: center;">
      <h1 class="page-title" style="font-size: 2.3rem;">Do you want to join Group #ID?</h1>
      <p style="font-weight: 700;">John Doe invited you to join group #ID.</p>

      <article class="group-card" style="width:100%; max-width: 320px; text-align:left;">
        <h4>Group ID</h4>
        <p class="meta">Start time:<br>End time:<br>Group note:<br>Num of students:<br>Location:</p>
      </article>

      <div class="action-stack" style="min-width: 180px;">
        <a class="btn btn-primary" href="join-success.html">Accept</a>
        <a class="btn btn-secondary" href="groups.html">Reject</a>
      </div>
    </section>
  </main>
</body>
</html>
