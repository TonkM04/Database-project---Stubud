<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StuBud Admin Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-light">
    <section class="card-wide purple-surface" style="max-width: 580px; padding: 48px 42px;">
      <h1 class="brand" style="font-size: 3.5rem;">StuBud</h1>
      <p class="subtitle" style="font-size: 2rem; font-weight: 700;">Admin Login</p>

      <form action="admin-dashboard.html" style="max-width: 320px; width: 100%; margin: 10px auto 0;">
        <div class="form-group">
          <label for="admin-email">Admin Email</label>
          <input id="admin-email" type="email" placeholder="admin@stubud.com" />
        </div>

        <div class="form-group">
          <label for="admin-password">Password</label>
          <input id="admin-password" type="password" placeholder="Enter password" />
        </div>

        <button class="btn btn-secondary btn-block" type="submit">Login</button>
      </form>
    </section>
  </main>
</body>
</html>
