<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StuBud Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-light">
    <section class="card-wide">
      <div class="topbar" style="align-items: center;">
        <div>
          <h1 class="page-title">Dashboard</h1>
          <p class="section-subtitle">Groups you’ve joined</p>
        </div>
      </div>

      <div class="dual-columns">
        <section>
          <div class="grid-cards" style="grid-template-columns: 1fr; max-width: 430px;">
            <article class="group-card">
              <h4>Group ID</h4>
              <p class="meta">Start time:<br>End time:<br>Group note:<br>Num of students:<br>Location.</p>
            </article>
            <article class="group-card">
              <h4>Group ID</h4>
              <p class="meta">Start time:<br>End time:<br>Group note:<br>Num of students:<br>Location.</p>
            </article>
          </div>
        </section>

        <aside class="action-stack" style="justify-self: end; margin-top: 16px;">
          <a class="btn btn-primary" href="profile.html">Edit Profile</a>
          <a class="btn btn-primary" href="join-group.html">Invite Student</a>
          <a class="btn btn-primary" href="groups.html">See Groups</a>
          <a class="btn btn-primary" href="students.html">See Students</a>
        </aside>
      </div>
    </section>
  </main>
</body>
</html>
